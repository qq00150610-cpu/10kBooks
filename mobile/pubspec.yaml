name: ten_k_books
description: 万卷书苑 - 多语言在线阅读平台

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  
  # 网络请求
  dio: ^5.3.3
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # UI 组件
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # 工具
  uuid: ^4.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.1
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  
  # 动画
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  generate: true
