# ============================================
# 万卷书苑 / 10kBooks - API 服务配置
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name api.10kbooks.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.10kbooks.com;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/api.10kbooks.com.pem;
    ssl_certificate_key /etc/nginx/ssl/api.10kbooks.com.key;
    ssl_trusted_certificate /etc/nginx/ssl/ca-chain.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 日志
    access_log /var/log/nginx/api_access.log json_logs;
    error_log /var/log/nginx/api_error.log;

    # 健康检查端点
    location /health {
        access_log off;
        proxy_pass http://api_backend/health;
    }

    # API 路由
    location / {
        # 速率限制
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 20;

        proxy_pass http://api_backend;
        proxy_hide_header X-Powered-By;
    }

    # ==========================================
    # 认证相关 - 更严格的限流
    # ==========================================
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn addr 5;

        proxy_pass http://api_backend;
        proxy_hide_header X-Powered-By;
    }

    location /api/v1/auth/register {
        limit_req zone=login_limit burst=3 nodelay;
        limit_conn addr 3;

        proxy_pass http://api_backend;
    }

    location /api/v1/auth/refresh {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://api_backend;
    }

    # ==========================================
    # 搜索接口 - 中等限流
    # ==========================================
    location /api/v1/search {
        limit_req zone=search_limit burst=15 nodelay;
        limit_conn addr 10;

        proxy_pass http://api_backend;
        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$host$request_uri$http_authorization";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ==========================================
    # 阅读器资源 - 允许较大请求
    # ==========================================
    location /api/v1/read/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn addr 10;
        client_max_body_size 50m;

        proxy_pass http://api_backend;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ==========================================
    # 上传接口 - 大文件处理
    # ==========================================
    location /api/v1/upload {
        limit_req zone=api_limit burst=5 nodelay;
        client_max_body_size 100m;
        proxy_request_buffering off;

        proxy_pass http://api_backend;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ==========================================
    # 管理后台 - IP 白名单（根据需要配置）
    # ==========================================
    location /api/v1/admin/ {
        # 允许的 IP 列表
        # allow 192.168.1.0/24;
        # allow 10.0.0.0/8;
        # deny all;

        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://api_backend;
    }

    # ==========================================
    # WebSocket 连接
    # ==========================================
    location /ws {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 错误处理
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
