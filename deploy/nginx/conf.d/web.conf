# ============================================
# 万卷书苑 / 10kBooks - 前端 Web 服务配置
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name www.10kbooks.com 10kbooks.com;

    # 强制 HTTPS 重定向
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.10kbooks.com 10kbooks.com;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/10kbooks.com.pem;
    ssl_certificate_key /etc/nginx/ssl/10kbooks.com.key;
    ssl_trusted_certificate /etc/nginx/ssl/ca-chain.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 根目录
    root /usr/share/nginx/html;
    index index.html;

    # 默认字符集
    charset utf-8;

    # 日志
    access_log /var/log/nginx/web_access.log json_logs;
    error_log /var/log/nginx/web_error.log;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # HTML 不缓存（动态内容）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 10;

        proxy_pass http://api_backend;
        proxy_hide_header X-Powered-By;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # WebSocket 支持
    location /ws {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|package\.json|node_modules) {
        deny all;
        return 404;
    }

    # 媒体文件代理（防盗链）
    location /media/ {
        valid_referers blocked server_names ~\.10kbooks\.;

        if ($invalid_referer) {
            return 403;
        }

        proxy_pass http://api_backend;
        add_header X-Content-Type-Options "nosniff";
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
