# ============================================
# 万卷书苑 / 10kBooks - CDN 回源配置
# ============================================

# 配置 CDN 回源请求的处理

server {
    listen 80;
    server_name cdn.10kbooks.com;

    # 验证 CDN 回源请求
    location / {
        # CDN 回源验证头
        set $cdn_ip $http_x_cdn_ip;
        set $from_cdn 0;

        if ($http_x_cdn_ip != "") {
            set $from_cdn 1;
        }

        # 记录回源请求
        access_log /var/log/nginx/cdn回源.log json_logs;

        # 直接代理到后端
        proxy_pass http://api_backend;
    }
}

# ============================================
# 媒体资源服务配置
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name media.10kbooks.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name media.10kbooks.com;

    ssl_certificate /etc/nginx/ssl/media.10kbooks.com.pem;
    ssl_certificate_key /etc/nginx/ssl/media.10kbooks.com.key;

    # 日志
    access_log /var/log/nginx/media_access.log json_logs;
    error_log /var/log/nginx/media_error.log;

    # 媒体文件缓存配置
    location ~* \.(mp3|mp4|m4a|ogg|webm|pdf|epub|mobi|azw3)$ {
        # 添加持久化缓存头
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # 防盗链
        valid_referers blocked server_names ~\.10kbooks\. ~\.google\. ~\.baidu\.;
        if ($invalid_referer) {
            # 返回小图或默认图片
            return 403;
        }

        # 代理到对象存储或后端
        proxy_pass http://api_backend;
        proxy_cache media_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_key "$host$uri";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 封面图片
    location /covers/ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";

        valid_referers blocked server_names ~\.10kbooks\.;
        if ($invalid_referer) {
            return 403;
        }

        proxy_pass http://api_backend;
        proxy_cache covers_cache;
        proxy_cache_valid 200 7d;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 头像和用户图片
    location /avatars/ {
        expires 30d;
        add_header Cache-Control "public";

        proxy_pass http://api_backend;
        proxy_cache avatars_cache;
        proxy_cache_valid 200 30d;
    }
}

# ============================================
# 缓存区域定义
# ============================================

# 在 http 块中添加:
# proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:100m max_size=1g inactive=60m use_temp_path=off;
# proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:500m max_size=10g inactive=30d use_temp_path=off;
# proxy_cache_path /var/cache/nginx/covers levels=1:2 keys_zone=covers_cache:50m max_size=1g inactive=7d use_temp_path=off;
# proxy_cache_path /var/cache/nginx/avatars levels=1:2 keys_zone=avatars_cache:20m max_size=500m inactive=30d use_temp_path=off;
