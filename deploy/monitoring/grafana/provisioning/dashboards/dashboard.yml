# ============================================
# 万卷书苑 / 10kBooks - Grafana 仪表板配置
# ============================================

# 仪表板供应配置
apiVersion: 1

providers:
  - name: '10kBooks Dashboards'
    orgId: 1
    folder: '10kBooks'
    folderUid: '10kbooks'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards

# 数据源配置
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: "trace_id=(\\w+)"
          url: ${DS_LOKI}
          datasourceUid: loki
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    jsonData:
      timeField: "@timestamp"
      esVersion: 80
      logMessageField: message
      logLevelField: level
    secureJsonData:
      basicAuthPassword: ${ELASTIC_PASSWORD}
    editable: true
