-- ============================================
-- 万卷书苑 / 10kBooks - PostgreSQL 配置
-- 生产环境主从复制配置
-- ============================================

-- ==========================================
-- 主库配置 (postgresql.conf)
-- ==========================================

-- 连接配置
listen_addresses = '*'
port = 5432
max_connections = 200

-- 内存配置
shared_buffers = 512MB                    -- 建议为系统内存的1/4
effective_cache_size = 1GB                -- 建议为系统内存的3/4
maintenance_work_mem = 128MB
work_mem = 16MB

-- 存储配置
wal_level = replica                        -- 启用 WAL 归档
max_wal_size = 1GB
min_wal_size = 80MB
wal_keep_size = 1GB                        -- 保留的 WAL 文件大小
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 300                      -- 5分钟超时归档

-- 复制配置
max_wal_senders = 5
max_replication_slots = 5
hot_standby = on
wal_sender_timeout = 60s
wal_receiver_timeout = 60s

-- 性能优化
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

-- 写入性能
synchronous_commit = on
fsync = on
full_page_writes = on

-- 日志配置
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'Asia/Shanghai'
log_min_duration_statement = 1000        -- 记录超过1秒的查询
log_connections = on
log_disconnections = on
log_lock_waits = on
log_statement = 'none'

-- 字符集
datestyle = 'iso, mdy'
timezone = 'Asia/Shanghai'
lc_messages = 'zh_CN.UTF-8'
lc_monetary = 'zh_CN.UTF-8'
lc_numeric = 'zh_CN.UTF-8'
lc_time = 'zh_CN.UTF-8'
default_text_search_config = 'pg_catalog.simple'

-- 安全
password_encryption = scram-sha-256
ssl = on
ssl_cert_file = '/etc/ssl/certs/ssl-cert-snakeoil.pem'
ssl_key_file = '/etc/ssl/private/ssl-cert-snakeoil.key'

-- ==========================================
-- 主库访问控制 (pg_hba.conf)
-- ==========================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# 本地连接
local   all             postgres                                peer
local   all             all                                     peer

# IPv4 本地回环
host    all             all             127.0.0.1/32            scram-sha-256

# 应用连接 (内网)
host    all             10kbooks         10.0.0.0/8              scram-sha-256

# 复制连接 (内网)
host    replication     replicator       10.0.0.0/8              scram-sha-256

# 管理连接 (仅跳板机)
host    all             admin            203.0.113.0/32          scram-sha-256

-- ==========================================
-- 从库配置 (postgresql.conf)
-- ==========================================

# 主库信息
primary_conninfo = 'host=master.10kbooks.com port=5432 user=replicator application_name=slave1'

# 恢复配置
hot_standby = on
wal_level = replica

# 复制槽
primary_slot_name = 'slave1_slot'

-- ==========================================
-- 创建复制用户的 SQL
-- ============================================

-- 在主库执行:
-- CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD 'your_secure_replication_password';

-- 创建复制槽:
-- SELECT pg_create_physical_replication_slot('slave1_slot');

-- ==========================================
-- 备份配置
-- ============================================

-- 基础备份脚本
-- pg_basebackup -h master.10kbooks.com -U replicator -D /var/lib/postgresql/backup/base -P -v -X stream -R

-- WAL 归档备份
-- 配合 cron:
-- 0 2 * * * postgres /usr/bin/pg_basebackup -h localhost -U replicator -D /var/lib/postgresql/backup/base -Ft -z -P -v
