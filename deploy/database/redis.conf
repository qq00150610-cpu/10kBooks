# ============================================
# 万卷书苑 / 10kBooks - Redis 集群配置
# 生产环境高可用配置
# ============================================

# ==========================================
# Redis 主节点配置
# ==========================================

# 网络
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 通用
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile "/var/log/redis/redis.log"
databases 16
always-show-logo no

# 持久化 - RDB
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 持久化 - AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# 内存
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# 客户端
maxclients 10000

# 安全
requirepass your_redis_master_password
masterauth your_redis_master_password

# 性能优化
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# 集群配置 (如果启用集群模式)
# cluster-enabled yes
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000
# cluster-replica-validity-factor 10
# cluster-migration-barrier 1
# cluster-require-full-coverage yes
# cluster-replica-no-failover no

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 发布订阅
notify-keyspace-events ""

# Lua 脚本
lua-time-limit 5000

-- ==========================================
# Redis 从节点配置
-- ==========================================

# 从节点配置与主节点相同，额外添加:
replicaof master.10kbooks.com 6379

# ==========================================
# Redis Sentinel 配置 (高可用)
# ==========================================

# sentinel.conf

port 26379
dir /tmp
sentinel monitor mymaster master.10kbooks.com 6379 2
sentinel auth-pass mymaster your_redis_master_password
sentinel down-after-milliseconds mymaster 30000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 180000
sentinel deny-scripts-reconfig yes

# 日志
logfile "/var/log/redis/sentinel.log"
loglevel notice

# 监控
sentinel monitor mymaster master.10kbooks.com 6379 2
sentinel known-replica mymaster slave.10kbooks.com 6379

# 自动发现
sentinel known-sentinel mymaster 203.0.113.2 26379 abc123def456
