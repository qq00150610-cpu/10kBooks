-- ==========================================
-- Elasticsearch 索引模板
-- ==========================================

-- 书籍索引
PUT /books
{
  "settings": {
    "number_of_shards": 3,
    "number_of_replicas": 1,
    "analysis": {
      "analyzer": {
        "multi_lang_analyzer": {
          "type": "custom",
          "tokenizer": "standard",
          "filter": ["lowercase", "asciifolding", "cjk_width"]
        },
        "chinese_analyzer": {
          "type": "custom",
          "tokenizer": "ik_max_word",
          "filter": ["lowercase"]
        }
      }
    }
  },
  "mappings": {
    "properties": {
      "id": { "type": "keyword" },
      "title": { 
        "type": "text",
        "analyzer": "multi_lang_analyzer",
        "fields": {
          "keyword": { "type": "keyword" }
        }
      },
      "description": { "type": "text", "analyzer": "multi_lang_analyzer" },
      "author": { "type": "keyword" },
      "language": { "type": "keyword" },
      "category": { "type": "keyword" },
      "tags": { "type": "keyword" },
      "publish_date": { "type": "date" },
      "rating": { "type": "float" },
      "view_count": { "type": "long" },
      "created_at": { "type": "date" },
      "updated_at": { "type": "date" }
    }
  }
}

-- 用户行为索引
PUT /user_activities
{
  "settings": {
    "number_of_shards": 2,
    "number_of_replicas": 1
  },
  "mappings": {
    "properties": {
      "user_id": { "type": "keyword" },
      "action_type": { "type": "keyword" },
      "book_id": { "type": "keyword" },
      "timestamp": { "type": "date" },
      "duration": { "type": "integer" },
      "progress": { "type": "float" }
    }
  }
}
