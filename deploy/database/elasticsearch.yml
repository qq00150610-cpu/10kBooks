# ============================================
# 万卷书苑 / 10kBooks - Elasticsearch 配置
# 搜索引擎集群配置
# ============================================

# ==========================================
# Elasticsearch 主配置文件
# ==========================================

# 集群名称
cluster.name: 10kbooks-cluster

# 节点名称
node.name: 10kbooks-es-node-1

# 节点类型 (master/data/ingest)
node.attr.rack: rack1

# 数据路径
path.data: /var/lib/elasticsearch/data
path.logs: /var/log/elasticsearch

# 内存锁定
bootstrap.memory_lock: true

# 网络
network.host: 0.0.0.0
http.port: 9200
transport.tcp.port: 9300

# 集群发现
discovery.seed_hosts:
  - 10kbooks-es-node-1:9300
  - 10kbooks-es-node-2:9300
  - 10kbooks-es-node-3:9300

# 初始主节点
cluster.initial_master_nodes:
  - 10kbooks-es-node-1
  - 10kbooks-es-node-2
  - 10kbooks-es-node-3

# ==========================================
# 内存配置
# ==========================================

# JVM 堆大小 (建议为系统内存的50%, 最大32GB)
# 在 jvm.options 中配置:
# -Xms2g
# -Xmx2g

# ==========================================
# 性能优化
# ==========================================

# 刷新频率
indices.memory.index_buffer_size: 20%
indices.queries.cache.size: 15%
indices.fielddata.cache.size: 20%

# 线程池
thread_pool.write.size: 30
thread_pool.write.queue_size: 1000
thread_pool.search.size: 30
thread_pool.search.queue_size: 1000

# 熔断器
breaker.fielddata.limit: 60%
breaker.request.limit: 40%
breaker.total.limit: 95%

# ==========================================
# 副本与分片
# ==========================================

# 默认分片数
index.number_of_shards: 3

# 默认副本数
index.number_of_replicas: 1

# 自动创建索引
action.auto_create_index: true

# ==========================================
# 快照配置
# ==========================================

# 快照仓库路径
path.repo: ["/var/lib/elasticsearch/backups"]

# ==========================================
# 监控配置
# ==========================================

# 收集统计信息
node.stats: true
indices.stats: true

# ==========================================
# 安全配置
# ==========================================

# X-Pack 安全
xpack.security.enabled: true
xpack.security.enrollment.enabled: true

# 内置用户
xpack.security.transport.ssl.enabled: true
xpack.security.transport.ssl.verification_mode: certificate
xpack.security.transport.ssl.client_authentication: required
xpack.security.transport.ssl.keystore.path: certs/elastic-certificates.p12
xpack.security.transport.ssl.truststore.path: certs/elastic-certificates.p12

xpack.security.http.ssl.enabled: false
xpack.security.http.ssl.keystore.path: certs/http.p12
xpack.security.http.ssl.truststore.path: certs/http.p12

# ==========================================
# ILM (索引生命周期管理)
# ==========================================

